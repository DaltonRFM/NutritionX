<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | NutritionApp</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">NutritionApp</h1>
            <p class="auth-subtitle">Create an account</p>

            <div id="error-message" class="error-message hidden"></div>

            <div class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" />
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" />
                </div>
                <button id="register-btn" class="btn-primary">Create Account</button>
            </div>

            <p class="auth-switch">
                Already have an account? <a href="/pages/login.html">Sign In</a>
            </p>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        if (getSession()) window.location.href = '/pages/browse.html';

        document.getElementById('register-btn').addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const error = document.getElementById('error-message');

            if (!email || !password || !confirm) {
                error.textContent = 'Please fill in all fields.';
                error.classList.remove('hidden');
                return;
            }

            if (password !== confirm) {
                error.textContent = 'Passwords do not match.';
                error.classList.remove('hidden');
                return;
            }

            if (password.length < 6) {
                error.textContent = 'Password must be at least 6 characters.';
                error.classList.remove('hidden');
                return;
            }

            const result = register(email, password);
            if (result.success) {
                window.location.href = '/pages/browse.html';
            } else {
                error.textContent = result.message;
                error.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
