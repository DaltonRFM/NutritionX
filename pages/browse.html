<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse | NutritionApp</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <nav class="navbar">
        <h1 class="nav-title">NutritionApp</h1>
        <div class="nav-right">
            <span id="nav-email" class="nav-email"></span>
            <button id="logout-btn" class="btn-logout">Logout</button>
        </div>
    </nav>

    <main class="browse-container">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search recipes... (e.g. chicken, salad, pasta)" />
            <button id="search-btn" class="btn-search">Search</button>
        </div>

        <div id="loading" class="loading hidden">Loading recipes...</div>
        <div id="error" class="error-banner hidden"></div>
        <div id="recipe-grid" class="recipe-grid"></div>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/browse.js"></script>
</body>
</html>
