<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse | Nutrition X</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <nav class="navbar">
    <h1 class="nav-title">Nutrition X</h1>
    <div class="nav-tabs">
    <a href="/pages/browse.html" class="nav-tab active">Browse</a>
    <a href="/pages/foodlog.html" class="nav-tab">Food Log</a>
    <a href="/pages/goals.html" class="nav-tab">Goals</a>
    <a href="/pages/calendar.html" class="nav-tab">Calendar</a>
    </div>
    <div class="nav-right">
        <span id="nav-email" class="nav-email"></span>
        <button id="logout-btn" class="btn-logout">Logout</button>
    </div>
</nav>

    <main class="browse-container">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search recipes... (e.g. chicken, salad, pasta)" />
            <button id="search-btn" class="btn-search">Search</button>
        </div>

        <div id="loading" class="loading hidden">Loading recipes...</div>
        <div id="error" class="error-banner hidden"></div>
        <div id="recipe-grid" class="recipe-grid"></div>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/browse.js"></script>
</body>
</html>
