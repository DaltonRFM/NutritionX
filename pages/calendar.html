<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar | Nutrition X</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <nav class="navbar">
        <h1 class="nav-title">Nutrition X</h1>
        <div class="nav-tabs">
            <a href="/pages/browse.html" class="nav-tab">Browse</a>
            <a href="/pages/foodlog.html" class="nav-tab">Food Log</a>
            <a href="/pages/goals.html" class="nav-tab">Goals</a>
            <a href="/pages/calendar.html" class="nav-tab active">Calendar</a>
        </div>
        <div class="nav-right">
            <span id="nav-email" class="nav-email"></span>
            <button id="logout-btn" class="btn-logout">Logout</button>
        </div>
    </nav>

    <main class="page-container">
        <div class="calendar-layout">

            <!-- Calendar Grid -->
            <div class="calendar-card">
                <div class="calendar-nav">
                    <button id="prev-month" class="cal-nav-btn">&#8592;</button>
                    <h2 id="calendar-title"></h2>
                    <button id="next-month" class="cal-nav-btn">&#8594;</button>
                </div>

                <div class="calendar-grid">
                    <div class="cal-day-header">Sun</div>
                    <div class="cal-day-header">Mon</div>
                    <div class="cal-day-header">Tue</div>
                    <div class="cal-day-header">Wed</div>
                    <div class="cal-day-header">Thu</div>
                    <div class="cal-day-header">Fri</div>
                    <div class="cal-day-header">Sat</div>
                </div>

                <div id="calendar-days" class="calendar-grid"></div>
            </div>

            <!-- Day Detail Panel -->
            <div class="calendar-detail-card">
                <h3 id="detail-title">Select a day</h3>
                <p id="detail-empty" class="muted-text">Click any day on the calendar to see what you ate.</p>

                <div id="detail-content" class="hidden">
                    <div class="totals-bar" id="detail-totals"></div>
                    <ul id="detail-list" class="log-list" style="margin-top: 16px;"></ul>
                </div>

                <div id="detail-no-log" class="hidden">
                    <p class="muted-text">No food logged on this day.</p>
                    <a href="/pages/foodlog.html" class="btn-primary" style="display:block; text-align:center; margin-top: 16px; text-decoration:none;">Log Food Today</a>
                </div>
            </div>

        </div>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/calendar.js"></script>
</body>
</html>
